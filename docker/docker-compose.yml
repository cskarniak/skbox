services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: skbox-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: skbox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
  redis-data:
